<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Convite Aniversário</title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="book-container">
        <div class="book">

            <!-- Página 1 -->
            <div class="page active" id="p1">
                <div class="content">
                    <div>
                        <h1>Você tem uma missão</h1>
                        <p>No meu aniversário você foi convocado para algo especial.</p>
                    </div>

                    <div class="bottom-area">
                        <button class="nav-btn" onclick="nextPage()">ABRIR</button>
                    </div>
                </div>
            </div>

            <!-- Página 2 -->
            <div class="page" id="p2">
                <div class="content">
                    <div>
                        <h2>Um voluntariado</h2>
                        <p>Minha jornada completa um novo ciclo e quero estar com você nesse dia fazendo algo especial.</p>
                        <p><strong>01 de Março de 2026 às 9h</strong></p>

                        <div id="countdown"></div>
                    </div>

                    <div class="bottom-area nav-group">
                        <button class="nav-btn-alt" onclick="prevPage()">VOLTAR</button>
                        <button class="nav-btn" onclick="nextPage()">PRÓXIMO</button>
                    </div>
                </div>
            </div>

            <!-- Página 3 -->
            <div class="page" id="p3">
                <div class="content">
                    <div>
                        <h2>Localização</h2>
                        <a href="https://maps.google.com" target="_blank" class="btn-link">VER NO MAPA</a>
                        <a href="https://wa.me/5500000000000" target="_blank" class="btn-link btn-confirm">CONFIRMAR PRESENÇA</a>
                    </div>

                    <div class="bottom-area">
                        <button class="nav-btn-alt" onclick="prevPage()">VOLTAR</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
